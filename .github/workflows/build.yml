name: Build Geode mod (CI)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Set ANDROID_SDK_ROOT
        run: |
          echo "ANDROID_SDK_ROOT=$RUNNER_TEMP/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$RUNNER_TEMP/android-sdk"
      
      - name: Debug: show environment and files
        run: |
          echo "PATH=$PATH"
          java -version || true
          ls -la
          ls -la .github || true

      - name: Install prerequisites
        run: sudo apt-get update && sudo apt-get install -y unzip wget

      - name: Install Android command-line tools and NDK (robust)
        run: |
          set -eux
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          TMPZIP=/tmp/cmdline.zip
          TOOLSDIR="$ANDROID_SDK_ROOT/cmdline-tools"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O $TMPZIP
          unzip -q $TMPZIP -d "$TOOLSDIR"
          # handle different extraction layouts
          if [ -d "$TOOLSDIR/cmdline-tools" ] && [ ! -d "$TOOLSDIR/tools" ]; then
            mkdir -p "$TOOLSDIR/tools"
            mv "$TOOLSDIR/cmdline-tools/"* "$TOOLSDIR/tools/" || true
          fi
          # show layout for debugging
          echo "cmdline-tools layout:"
          ls -la "$TOOLSDIR" || true
          ls -la "$TOOLSDIR/tools" || true
          SDKMANAGER="$TOOLSDIR/tools/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            echo "ERROR: sdkmanager not found at $SDKMANAGER"
            exit 127
          fi
          yes | "$SDKMANAGER" --sdk_root="$ANDROID_SDK_ROOT" --licenses
          "$SDKMANAGER" --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-31" "ndk;23.1.7779620"

      - name: Add Android tools to PATH
        run: |
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/cmdline-tools/tools/bin" >> $GITHUB_PATH
          echo "PATH now: $PATH"

      - name: Debug: show android sdk tools
        run: |
          ls -la "$ANDROID_SDK_ROOT" || true
          ls -la "$ANDROID_SDK_ROOT/cmdline-tools/tools/bin" || true
          which sdkmanager || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('**/*.gradle*', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Ensure gradlew and build
        run: |
          set -eux
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            ./gradlew --version
          else
            echo "ERROR: gradlew not found in repo root"
            ls -la
            exit 127
          fi
          ./gradlew assembleRelease -Pandroid.sdk.dir="$ANDROID_SDK_ROOT" --stacktrace

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: geode-build
          path: |
            app/build/outputs/**/*.apk
            build/outputs/**/*.aar
            *.zip
            *.geode
